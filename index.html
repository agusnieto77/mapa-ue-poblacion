<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Mapa interactivo de proyección poblacional de la Unión Europea 2015-2080 con datos de Eurostat">
<meta name="theme-color" content="#0f0f1a">
<title>Proyección Poblacional UE 2015-2080</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--population-gradient:linear-gradient(90deg,#1a1a2e 0%,#fff8e1 3%,#ffecb3 6%,#ffd54f 12%,#ffb74d 18%,#ff9800 25%,#f57c00 40%,#ef6c00 55%,#e53935 68%,#c62828 78%,#b71c1c 87%,#880e4f 95%,#4a148c 100%)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0f0f1a;color:#e0e0e0;overflow:hidden;height:100vh}
#map{position:absolute;inset:0;z-index:1}
.leaflet-interactive:focus{outline:1px solid transparent}
#title-bar{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:1000;background:transparent;padding:10px 28px;text-align:center;pointer-events:none}
#title-bar h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:.5px}
#title-bar p{font-size:11px;color:#888;margin-top:2px}
#controls{position:absolute;bottom:0;left:0;right:0;z-index:1000;background:transparent;padding:14px 30px 18px;display:flex;flex-direction:column;align-items:center;gap:8px}
#year-display{font-size:52px;font-weight:800;color:#fff;line-height:1;letter-spacing:-1px}
#year-display span{color:#4fc3f7}
.slider-row{display:flex;align-items:center;gap:14px;width:100%;max-width:700px}
#play-btn{background:none;border:2px solid #4fc3f7;color:#4fc3f7;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;flex-shrink:0}
#play-btn:hover{background:#4fc3f7;color:#0f0f1a}
#play-btn.playing{border-color:#ef5350;color:#ef5350}
#play-btn.playing:hover{background:#ef5350;color:#fff}
#play-btn:focus-visible,#year-slider:focus-visible,#panel-close:focus-visible{outline:3px solid #4fc3f7;outline-offset:2px}
#year-slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:var(--population-gradient);outline:none;cursor:pointer}
#year-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}
#year-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;cursor:pointer;border:none;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.year-labels{display:flex;justify-content:space-between;width:100%;max-width:700px;font-size:13px;color:#ccc;font-weight:700}
#legend{position:absolute;bottom:140px;left:14px;z-index:1000;background:rgba(15,15,26,.92);backdrop-filter:blur(12px);padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.08)}
#legend h3{font-size:11px;color:#aaa;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
#legend-gradient{width:140px;height:14px;border-radius:4px;background:var(--population-gradient)}
.legend-labels{display:flex;justify-content:space-between;width:140px;margin-top:4px;font-size:10px;color:#888}
#panel{position:absolute;top:88px;right:14px;z-index:1000;background:rgba(15,15,26,.94);backdrop-filter:blur(12px);width:300px;border-radius:14px;border:1px solid rgba(255,255,255,.08);overflow:hidden;transition:transform .3s,opacity .3s;transform:translateX(320px);opacity:0}
#panel.visible{transform:translateX(0);opacity:1}
#panel-header{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.06);position:relative}
#panel-header h2{font-size:18px;font-weight:700;color:#fff}
#panel-header .subtitle{font-size:11px;color:#888;margin-top:2px}
#panel-body{padding:14px 18px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.stat-row:last-child{border-bottom:none}
.stat-label{font-size:12px;color:#888}
.stat-value{font-size:14px;font-weight:600;color:#fff}
.stat-change{font-size:11px;font-weight:600;margin-left:6px}
.stat-change.up{color:#66bb6a}.stat-change.down{color:#ef5350}
#chart-container{margin-top:12px;background:rgba(255,255,255,.03);border-radius:8px;padding:10px}
#country-chart{width:100%;height:140px}
#panel-close{position:absolute;top:12px;right:14px;z-index:1;background:none;border:none;color:#888;font-size:18px;cursor:pointer;line-height:1}
#panel-close:hover{color:#fff}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2000;text-align:center}
#loading .spinner{width:40px;height:40px;border:3px solid rgba(79,195,247,.2);border-top-color:#4fc3f7;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:#888}
.error-message{background:rgba(239,83,80,.1);border:1px solid #ef5350;border-radius:8px;padding:16px;text-align:center}
.info-tooltip{background:rgba(15,15,26,.95)!important;border:1px solid rgba(255,255,255,.12)!important;border-radius:8px!important;padding:10px 14px!important;color:#e0e0e0!important;font-family:'Segoe UI',system-ui,sans-serif!important;box-shadow:0 4px 20px rgba(0,0,0,.5)!important}
.info-tooltip .country-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}.info-tooltip .pop-value{font-size:18px;font-weight:800;color:#4fc3f7}.info-tooltip .pop-label{font-size:10px;color:#888;margin-top:1px}
.leaflet-popup-content-wrapper{background:rgba(15,15,26,.95)!important;border:1px solid rgba(255,255,255,.12)!important;border-radius:12px!important;box-shadow:0 8px 32px rgba(0,0,0,.6)!important;padding:0!important}
.leaflet-popup-content{margin:0!important;padding:16px!important;color:#e0e0e0!important;font-family:'Segoe UI',system-ui,sans-serif!important;min-width:260px}.leaflet-popup-tip{background:rgba(15,15,26,.95)!important;border:1px solid rgba(255,255,255,.12)!important}
@media(max-width:768px){#panel{width:calc(100% - 28px);right:14px;top:auto;bottom:150px;max-height:260px;overflow-y:auto}#title-bar h1{font-size:14px}#year-display{font-size:36px}#legend{bottom:160px}}
</style>
</head>
<body>
<div id="map" role="application" tabindex="0" aria-label="Mapa interactivo de la Unión Europea"></div>
<div id="title-bar"><h1>Proyección Poblacional UE 2015-2080</h1><p>Fuente: Eurostat - Desliza el slider para explorar</p></div>
<div id="legend"><h3>Población</h3><div id="legend-gradient"></div><div class="legend-labels"><span>0</span><span>20M</span><span>50M</span><span>85M</span></div></div>
<div id="panel" role="dialog" aria-labelledby="panel-country" aria-hidden="true"><button id="panel-close" aria-label="Cerrar panel">&times;</button><div id="panel-header"><h2 id="panel-country"></h2><div class="subtitle" id="panel-year"></div></div><div id="panel-body"><div class="stat-row"><span class="stat-label">Población actual</span><span class="stat-value" id="stat-pop"></span></div><div class="stat-row"><span class="stat-label">Densidad</span><span class="stat-value" id="stat-density"></span></div><div class="stat-row"><span class="stat-label">Cambio vs 2015</span><span class="stat-value" id="stat-change"></span></div><div class="stat-row"><span class="stat-label">Pico de población</span><span class="stat-value" id="stat-peak"></span></div><div id="chart-container"><canvas id="country-chart" role="img" aria-label="Evolución de población"></canvas></div></div></div>
<div id="controls" role="region" aria-label="Controles de reproducción"><div id="year-display" aria-live="polite"><span>2015</span></div><div class="slider-row"><button id="play-btn" aria-label="Reproducir animación" aria-pressed="false">&#9654;</button><input type="range" id="year-slider" min="0" max="7" value="0" step="1" aria-label="Seleccionar año" aria-valuemin="0" aria-valuemax="7" aria-valuenow="0"></div><div class="year-labels" aria-hidden="true"><span>2015</span><span>2020</span><span>2030</span><span>2040</span><span>2050</span><span>2060</span><span>2070</span><span>2080</span></div></div>
<div id="loading" role="status" aria-live="polite"><div class="spinner"></div><p>Cargando datos de Eurostat...</p></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
<script src="app.js?v=2"></script>
</body>
</html>
