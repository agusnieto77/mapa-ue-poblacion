<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0f0f1a;color:#e0e0e0;overflow:hidden;height:100vh}

#year-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;cursor:pointer;border:none;box-shadow:0 2px 8px rgba(0,0,0,0.4)}
.year-labels{display:flex;justify-content:space-between;width:100%;max-width:700px;font-size:10px;color:#666}
#legend{position:absolute;bottom:140px;left:14px;z-index:1000;background:rgba(15,15,26,0.92);backdrop-filter:blur(12px);padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.08)}

#panel-body{padding:14px 18px}

#country-chart{width:100%;height:140px}
#panel-close{position:absolute;top:12px;right:14px;background:none;border:none;color:#888;font-size:18px;cursor:pointer;line-height:1}
#panel-close:hover{color:#fff}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2000;text-align:center}

.leaflet-popup-tip{background:rgba(15,15,26,0.95)!important;border:1px solid rgba(255,255,255,0.12)!important}
.leaflet-popup-close-button{color:#888!important;font-size:20px!important}
.leaflet-popup-close-button:hover{color:#fff!important}
@media(max-width:768px){
#panel{width:calc(100% - 28px);right:14px;top:auto;bottom:150px;max-height:260px;overflow-y:auto}
#title-bar h1{font-size:14px}
#year-display{font-size:36px}
#legend{bottom:160px}
}
</style>

<script>
const YEARS=[2015,2020,2030,2040,2050,2060,2070,2080];
const popData={"Austria":{id:20,area:83879,pop:{2015:8576261,2020:9005487,2030:9675572,2040:10087623,2050:10247691,2060:10230993,2070:10171555,2080:10072112}},"Belgium":{id:1,area:30528,pop:{2015:11208986,2020:11580268,2030:12264124,2040:12844259,2050:13273155,2060:13580693,2070:13888154,2080:14189456}},"Bulgaria":{id:2,area:110879,pop:{2015:7202198,2020:6954254,2030:6408361,2040:5933535,2050:5564146,2060:5225824,2070:4871873,2080:4593415}},"Croatia":{id:11,area:56594,pop:{2015:4225316,2020:4091559,2030:3954893,2040:3819863,2050:3674791,2060:3533771,2070:3401757,2080:3276481}},"Czechia":{id:3,area:78867,pop:{2015:10538275,2020:10652407,2030:10691890,2040:10552301,2050:10478190,2060:10307640,2070:9983111,2080:9777734}},"Denmark":{id:4,area:42933,pop:{2015:5659715,2020:5887449,2030:6298421,2040:6564333,2050:6685016,2060:6756166,2070:6826143,2080:6858258}},"Estonia":{id:6,area:45228,pop:{2015:1313271,2020:1317940,2030:1306181,2040:1283732,2050:1256975,2060:1221012,2070:1178364,2080:1140304}},"Finland":{id:26,area:338424,pop:{2015:5471753,2020:5561792,2030:5697608,2040:5722378,2050:5687527,2060:5654618,2070:5626229,2080:5577757}},"France":{id:10,area:640679,pop:{2015:66415161,2020:67818978,2030:70525154,2040:72915525,2050:74376832,2060:75525269,2070:76946531,2080:78688730}},"Germany":{id:5,area:357022,pop:{2015:81197537,2020:83751689,2030:84613298,2040:84133642,2050:82686973,2060:80831728,2070:79292754,2080:77793794}},"Greece":{id:8,area:131957,pop:{2015:10858018,2020:10560467,2030:9944658,2040:9419973,2050:8918545,2060:8294677,2070:7685925,2080:7264686}},"Hungary":{id:17,area:93028,pop:{2015:9855571,2020:9789630,2030:9665170,2040:9471313,2050:9287196,2060:9119692,2070:8883760,2080:8691906}},"Ireland":{id:7,area:70273,pop:{2015:4628949,2020:4852123,2030:5146475,2040:5396380,2050:5693430,2060:5898111,2070:6034648,2080:6220907}},"Italy":{id:12,area:301340,pop:{2015:60795612,2020:60718572,2030:60350475,2040:59982002,2050:58968137,2060:56948693,2070:54935591,2080:53784578}} const nameByNumId={};for(const[name,d]of Object.entries(popData)){nameByNumId[String(d.id)]=name;}
const aliases={"Czech Republic":"Czechia","Slovak Republic":"Slovakia","United Kingdom of Great Britain and Northern Ireland":"United Kingdom"};
function resolveName(geoName){if(popData[geoName])return geoName;if(aliases[geoName])return aliases[geoName];for(const key of Object.keys(aliases)){if(geoName.includes(key)||key.includes(geoName))return aliases[key];}return null;}
const euIsoNumeric=new Set(Object.values(popData).map(d=>String(d.id)));
function getColor(pop){if(!pop||pop<=0)return'#1a1a2e';if(pop<5000000)return'#fff3e0';if(pop<20000000)return'#ffb74d';if(pop<50000000)return'#f57c00';if(pop<80000000)return'#d32f2f';return'#b71c1c';}
function formatNum(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function formatPct(v){return(v>=0?'+':'')+v.toFixed(1)+'%';}
let currentYearIdx=0;let playing=false;let playInterval=null;let geoLayer=null;let selectedCountry=null;let chartInstance=null;
const map=L.map('map',{center:[50,15],zoom:4,minZoom:3,maxZoom:8,zoomControl:false,attributionControl:false});
L.control.zoom({position:'topright'}).addTo(map);
L.control.attribution({position:'bottomright',prefix:false}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{attribution:'OpenStreetMap, CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19,pane:'overlayPane'}).addTo(map);
function updateMapColors(){if(!geoLayer)return;const year=YEARS[currentYearIdx];geoLayer.eachLayer(layer=>{const name=layer.feature._popName;if(name&&popData[name]){const pop=popData[name].pop[year];layer.setStyle({fillColor:getColor(pop),fillOpacity:0.7,weight:1,color:'rgba(255,255,255,0.2)'});}else{layer.setStyle({fillColor:'#0d0d1a',fillOpacity:0.3,weight:0.5,color:'rgba(255,255,255,0.05)'});}});}
function updateUI(){const year=YEARS[currentYearIdx];document.querySelector('#year-display').innerHTML='<span>'+year+'</span>';document.getElementById('year-slider').value=currentYearIdx;updateMapColors();if(selectedCountry)updatePanel(selectedCountry,year);}
function updatePanel(name,year){const d=popData[name];if(!d)return;document.getElementById('panel-country').textContent=name;document.getElementById('panel-year').textContent='Datos para '+year;document.getElementById('stat-pop').textContent=formatNum(d.pop[year])+' hab.';const density=(d.pop[year]/d.area).toFixed(1);document.getElementById('stat-density').textContent=density+' hab./km2';const change=((d.pop[year]-d.pop[2015])/d.pop[2015]*100);const changeEl=document.getElementById('stat-change');changeEl.innerHTML=formatPct(change)+'<span class="stat-change '+(change>=0?'up':'down')+'">'+(change>=0?'up':'down')+'</span>';let peakYear=2015,peakPop=0;for(const y of YEARS){if(d.pop[y]>peakPop){peakPop=d.pop[y];peakYear=y;}}document.getElementById('stat-peak').textContent=formatNum(peakPop)+' ('+peakYear+')';renderChart(name);}
function renderChart(name){const d=popData[name];if(!d)return;const canvas=document.getElementById('country-chart');if(chartInstance)chartInstance.destroy();const year=YEARS[currentYearIdx];chartInstance=new Chart(canvas,{type:'line',data:{labels:YEARS,datasets:[{data:YEARS.map(y=>d.pop[y]),borderColor:'#4fc3f7',backgroundColor:'rgba(79,195,247,0.1)',fill:true,tension:0.3,pointRadius:YEARS.map(y=>y===year?6:3),pointBackgroundColor:YEARS.map(y=>y===year?'#fff':'#4fc3f7'),pointBorderColor:YEARS.map(y=>y===year?'#4fc3f7':'transparent'),pointBorderWidth:YEARS.map(y=>y===year?2:0),borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#888',font:{size:9},callback:v=>(v/1000000).toFixed(0)+'M'},grid:{color:'rgba(255,255,255,0.04)'}}}}});}
function onEachFeature(feature,layer){const name=feature.properties&&feature.properties.name;if(!name||!popData[name])return;feature._popName=name;const year=YEARS[currentYearIdx];layer.setStyle({fillColor:getColor(popData[name].pop[year]),fillOpacity:0.7,weight:1,color:'rgba(255,255,255,0.2)'});layer.bindTooltip(()=>{return'<div class="country-name">'+name+'</div><div class="pop-value">'+formatNum(popData[name].pop[YEARS[currentYearIdx]])+'</div><div class="pop-label">habitantes ('+YEARS[currentYearIdx]+')</div>';},{className:'info-tooltip',sticky:true});layer.on({mouseover:function(e){if(!selectedCountry||selectedCountry!==name){e.target.setStyle({weight:2,color:'#4fc3f7',fillOpacity:0.85});e.target.bringToFront();}},mouseout:function(e){if(selectedCountry!==name){e.target.setStyle({weight:1,color:'rgba(255,255,255,0.2)',fillOpacity:0.7});}},click:function(e){if(selectedCountry){const prev=geoLayer.getLayers().find(l=>l.feature._popName===selectedCountry);if(prev)prev.setStyle({weight:1,color:'rgba(255,255,255,0.2)',fillOpacity:0.7});}selectedCountry=name;e.target.setStyle({weight:3,color:'#4fc3f7',fillOpacity:0.9});e.target.bringToFront();updatePanel(name,YEARS[currentYearIdx]);document.getElementById('panel').classList.add('visible');map.fitBounds(e.target.getBounds(),{padding:[40,320,40,40],maxZoom:6});const d=popData[name];e.target.bindPopup(()=>{return'<div style="text-align:center"><b style="font-size:15px;color:#fff">'+name+'</b><br><span style="font-size:11px;color:#888">'+YEARS[currentYearIdx]+'</span><br><span style="font-size:22px;font-weight:800;color:#4fc3f7">'+formatNum(d.pop[YEARS[currentYearIdx]])+'</span><br><span style="font-size:11px;color:#888">habitantes</span></div>';},{maxWidth:280}).openPopup();}});}
document.getElementById('year-slider').addEventListener('input',function(){currentYearIdx=parseInt(this.value);updateUI();});
